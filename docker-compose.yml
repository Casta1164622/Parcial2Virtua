version: "1"
services:

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: parcialweb
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./web/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./web/certs:/etc/nginx/certs:ro
    networks:
      parcialnet:
        ipv4_address: 10.10.10.10
    restart: unless-stopped

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: parcialapp
    depends_on:
      - db
    volumes:
      - ./app/src:/var/www/html
      - ./app/apache-vhost.conf:/etc/apache2/sites-available/000-default.conf:ro
    networks:
      parcialnet:
        ipv4_address: 10.10.10.20
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: parcialdb
    command: --default-authentication-plugin=mysql_native_password
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: parcialdb
      MYSQL_USER: parcialuser
      MYSQL_PASSWORD: parcialpass123
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d:ro
    networks:
      parcialnet:
        ipv4_address: 10.10.10.30
    restart: unless-stopped

networks:
  parcialnet:
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.10.0/24

volumes:
  db_data: